stages:
  - lint
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

default:
  image: python:3.12

lint:
  stage: lint
  script:
    - pip install -e ".[dev]"
    - ruff check src tests

test:
  stage: test
  script:
    - pip install -e ".[dev]"
    - pytest tests/ -v --tb=short
